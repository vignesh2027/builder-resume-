<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Wide Header Template</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template ats-wide-header-template">
        <div class="header">
            <div class="header-content">
                <div class="name-section">
                    <h1 class="name" id="previewName">Your Name</h1>
                </div>
                <div class="contact-section">
                    <div id="previewEmail"></div>
                    <div id="previewPhone"></div>
                    <div id="previewLocation"></div>
                    <div id="previewLinkedIn"></div>
                </div>
            </div>
        </div>
        
        <div class="section">
            <h2>Professional Summary</h2>
            <p id="previewSummary"></p>
        </div>
        
        <div class="section">
            <h2>Professional Experience</h2>
            <div id="previewExperience"></div>
        </div>
        
        <div class="section">
            <h2>Education</h2>
            <div id="previewEducation"></div>
        </div>
        
        <div class="section">
            <h2>Skills</h2>
            <div id="previewSkills"></div>
        </div>
    </div>

    <style>
        .ats-wide-header-template { 
            font-family: 'Arial', sans-serif; 
            background: #ffffff; 
            color: #000000; 
            line-height: 1.5; 
            max-width: 8.5in; 
            margin: 0 auto; 
            padding: 1in;
        }
        .ats-wide-header-template .header { 
            background: #f8f8f8;
            padding: 1rem;
            margin-bottom: 1.5rem; 
        }
        .ats-wide-header-template .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .ats-wide-header-template .name { 
            font-size: 2.2rem; 
            margin: 0; 
            font-weight: bold; 
            color: #000000;
        }
        .ats-wide-header-template .contact-section div { 
            font-size: 1rem; 
            color: #000000;
            margin: 0.1rem 0;
            text-align: right;
        }
        .ats-wide-header-template .section { 
            margin-bottom: 1.5rem; 
        }
        .ats-wide-header-template h2 { 
            color: #000000; 
            font-size: 1.3rem; 
            margin-bottom: 0.8rem; 
            font-weight: bold; 
            border-bottom: 2px solid #000000;
            padding-bottom: 0.2rem;
        }
        .ats-wide-header-template .experience-entry, .ats-wide-header-template .education-entry { 
            margin-bottom: 1.3rem; 
        }
        .ats-wide-header-template .entry-title { 
            font-weight: bold; 
            font-size: 1.1rem; 
            color: #000000; 
            margin-bottom: 0.2rem;
        }
        .ats-wide-header-template .entry-company { 
            color: #000000; 
            font-weight: normal; 
            font-size: 1rem;
        }
        .ats-wide-header-template .entry-dates { 
            color: #666666; 
            font-size: 1rem; 
            margin-top: 0.2rem;
        }
        .ats-wide-header-template .skills-list { 
            display: block; 
        }
        .ats-wide-header-template .skill-tag { 
            display: inline-block; 
            color: #000000; 
            padding: 0.2rem 0.5rem; 
            margin: 0.2rem 0.3rem 0.2rem 0; 
            font-size: 1rem; 
            border: 1px solid #ccc;
        }
    </style>

    <script src="../script.js"></script>
</body>
</html>
