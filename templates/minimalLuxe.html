<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Luxe Template</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template minimal-luxe-template">
        <div class="header-section">
            <h1 class="name" id="previewName">Your Name</h1>
            <h2 class="title" id="previewJobTitle">Professional Title</h2>
            <div class="contact-info">
                <span id="previewEmail"></span> • <span id="previewPhone"></span> • <span id="previewLocation"></span> • <span id="previewLinkedIn"></span>
            </div>
        </div>
        
        <div class="content-wrapper">
            <div class="section">
                <h3>Professional Summary</h3>
                <p id="previewSummary"></p>
            </div>
            
            <div class="section">
                <h3>Experience</h3>
                <div id="previewExperience"></div>
            </div>
            
            <div class="dual-section">
                <div class="left-column">
                    <div class="section">
                        <h3>Education</h3>
                        <div id="previewEducation"></div>
                    </div>
                </div>
                
                <div class="right-column">
                    <div class="section">
                        <h3>Skills</h3>
                        <div id="previewSkills" class="skills-list"></div>
                    </div>
                    
                    <div class="section">
                        <h3>Languages</h3>
                        <div id="previewLanguages" class="skills-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .minimal-luxe-template { 
            font-family: 'Helvetica Neue', 'Arial', sans-serif; 
            background: #ffffff; 
            color: #2c2c2c; 
            line-height: 1.6; 
            max-width: 8.5in; 
            margin: 0 auto; 
            font-weight: 300;
        }
        .minimal-luxe-template .header-section { 
            text-align: center; 
            padding: 4rem 2rem 3rem; 
            border-bottom: 2px solid #d4af37;
            margin-bottom: 3rem;
        }
        .minimal-luxe-template .name { 
            font-size: 3.5rem; 
            margin: 0; 
            font-weight: 100; 
            letter-spacing: 4px; 
            color: #1a365d;
            text-transform: uppercase;
        }
        .minimal-luxe-template .title { 
            font-size: 1.3rem; 
            margin: 1rem 0 2rem 0; 
            font-weight: 300; 
            color: #d4af37; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .minimal-luxe-template .contact-info { 
            font-size: 1rem; 
            color: #666; 
            font-weight: 300;
            letter-spacing: 1px;
        }
        .minimal-luxe-template .content-wrapper { 
            padding: 0 3rem 2rem; 
        }
        .minimal-luxe-template .section { 
            margin-bottom: 3rem; 
        }
        .minimal-luxe-template h3 { 
            color: #1a365d; 
            font-size: 1.1rem; 
            margin-bottom: 2rem; 
            font-weight: 400; 
            text-transform: uppercase;
            letter-spacing: 3px;
            position: relative;
            padding-bottom: 1rem;
        }
        .minimal-luxe-template h3::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 40px;
            height: 1px;
            background: #d4af37;
        }
        .minimal-luxe-template .dual-section { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 4rem; 
        }
        .minimal-luxe-template .experience-entry, .minimal-luxe-template .education-entry { 
            margin-bottom: 2.5rem; 
            padding-bottom: 2rem;
            border-bottom: 1px solid #f0f0f0;
        }
        .minimal-luxe-template .entry-title { 
            font-weight: 400; 
            font-size: 1.2rem; 
            color: #1a365d; 
            margin-bottom: 0.5rem;
        }
        .minimal-luxe-template .entry-company { 
            color: #d4af37; 
            font-weight: 300; 
            font-size: 1rem;
            font-style: italic;
        }
        .minimal-luxe-template .entry-dates { 
            color: #888; 
            font-size: 0.9rem; 
            font-weight: 300;
            margin-top: 0.5rem;
        }
        .minimal-luxe-template .skills-list { 
            display: block; 
        }
        .minimal-luxe-template .skill-tag { 
            display: inline-block; 
            background: transparent; 
            color: #1a365d; 
            padding: 0.5rem 0; 
            margin: 0.3rem 1.5rem 0.3rem 0; 
            font-size: 0.95rem; 
            font-weight: 300; 
            border-bottom: 1px solid #d4af37;
        }
    </style>

    <script src="../script.js"></script>
</body>
</html>
