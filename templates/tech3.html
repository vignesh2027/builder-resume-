<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Template 3</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template tech3-template">
        <div class="header-section">
            <div class="header-content">
                <div class="name-section">
                    <h1 class="name" id="previewName">Your Name</h1>
                    <h2 class="title" id="previewJobTitle">Data Scientist</h2>
                </div>
                <div class="contact-section">
                    <div class="contact-item" id="previewEmail"></div>
                    <div class="contact-item" id="previewPhone"></div>
                    <div class="contact-item" id="previewLocation"></div>
                    <div class="contact-item" id="previewLinkedIn"></div>
                </div>
            </div>
        </div>
        
        <div class="content-wrapper">
            <div class="summary-section">
                <h3>Data Science Profile</h3>
                <p id="previewSummary"></p>
            </div>
            
            <div class="main-grid">
                <div class="primary-column">
                    <div class="section">
                        <h3>Professional Experience</h3>
                        <div id="previewExperience"></div>
                    </div>
                    
                    <div class="section">
                        <h3>Data Projects & Analytics</h3>
                        <ul id="previewProjects"></ul>
                    </div>
                </div>
                
                <div class="secondary-column">
                    <div class="section">
                        <h3>Technical Skills</h3>
                        <div id="previewSkills" class="skills-list"></div>
                    </div>
                    
                    <div class="section">
                        <h3>Portfolio & Code</h3>
                        <div class="portfolio-links">
                            <div class="portfolio-item">GitHub: github.com/username</div>
                            <div class="portfolio-item">Kaggle: kaggle.com/username</div>
                            <div class="portfolio-item">Portfolio: datascience.dev</div>
                        </div>
                    </div>
                    
                    <div class="section">
                        <h3>Education & Certifications</h3>
                        <div id="previewEducation"></div>
                    </div>
                    
                    <div class="section">
                        <h3>Languages</h3>
                        <div id="previewLanguages" class="skills-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .tech3-template { 
            font-family: 'Source Sans Pro', 'Segoe UI', sans-serif; 
            background: #ffffff; 
            color: #2d3748; 
            line-height: 1.6; 
            max-width: 8.5in; 
            margin: 0 auto; 
            border: 1px solid #e2e8f0;
        }
        .tech3-template .header-section { 
            background: linear-gradient(135deg, #4c51bf 0%, #667eea 50%, #764ba2 100%); 
            color: white; 
            padding: 2.5rem 2rem; 
            position: relative;
            overflow: hidden;
        }
        .tech3-template .header-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><polygon points="50,10 90,90 10,90" fill="rgba(255,255,255,0.05)"/><polygon points="20,20 40,60 0,60" fill="rgba(255,255,255,0.03)"/><polygon points="80,30 100,70 60,70" fill="rgba(255,255,255,0.04)"/></svg>');
            animation: float 20s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        .tech3-template .header-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            align-items: center;
            position: relative;
            z-index: 1;
        }
        .tech3-template .name { 
            font-size: 2.8rem; 
            margin: 0; 
            font-weight: 700; 
            letter-spacing: 1px; 
        }
        .tech3-template .title { 
            font-size: 1.4rem; 
            margin: 0.5rem 0 0 0; 
            font-weight: 400; 
            opacity: 0.95; 
        }
        .tech3-template .contact-section {
            text-align: right;
        }
        .tech3-template .contact-item { 
            margin-bottom: 0.8rem; 
            font-size: 0.95rem; 
        }
        .tech3-template .content-wrapper { 
            padding: 2.5rem 2rem; 
        }
        .tech3-template .summary-section { 
            margin-bottom: 2.5rem; 
            padding: 2rem; 
            background: linear-gradient(135deg, #edf2f7 0%, #e2e8f0 100%); 
            border-radius: 12px;
            border: 1px solid #cbd5e0;
            position: relative;
        }
        .tech3-template .summary-section::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            height: 4px;
            background: linear-gradient(135deg, #4c51bf, #667eea, #764ba2);
            border-radius: 12px 12px 0 0;
        }
        .tech3-template .summary-section h3 { 
            margin: 0 0 1rem 0; 
            color: #4c51bf; 
            font-size: 1.3rem; 
            font-weight: 600; 
        }
        .tech3-template .main-grid { 
            display: grid; 
            grid-template-columns: 2fr 1fr; 
            gap: 2.5rem; 
        }
        .tech3-template .section { 
            margin-bottom: 2rem; 
        }
        .tech3-template h3 { 
            color: #4c51bf; 
            font-size: 1.2rem; 
            margin-bottom: 1.2rem; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            position: relative;
            padding-bottom: 0.8rem;
        }
        .tech3-template h3::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50px;
            height: 3px;
            background: linear-gradient(135deg, #4c51bf, #667eea);
            border-radius: 2px;
        }
        .tech3-template .experience-entry, .tech3-template .education-entry { 
            margin-bottom: 1.8rem; 
            padding: 1.5rem; 
            background: #f7fafc; 
            border-radius: 8px;
            border-left: 4px solid #4c51bf;
            position: relative;
        }
        .tech3-template .entry-title { 
            font-weight: 700; 
            font-size: 1.1rem; 
            color: #2d3748; 
            margin-bottom: 0.3rem;
        }
        .tech3-template .entry-company { 
            color: #4c51bf; 
            font-weight: 600; 
            font-size: 1rem;
        }
        .tech3-template .entry-dates { 
            color: #718096; 
            font-size: 0.9rem; 
            font-weight: 500;
        }
        .tech3-template .skills-list { 
            display: block; 
        }
        .tech3-template .skill-tag { 
            display: inline-block; 
            background: linear-gradient(135deg, #4c51bf, #667eea); 
            color: white; 
            padding: 0.5rem 1rem; 
            margin: 0.3rem; 
            border-radius: 20px; 
            font-size: 0.85rem; 
            font-weight: 500; 
            box-shadow: 0 2px 4px rgba(76, 81, 191, 0.2);
        }
        .tech3-template .secondary-column {
            background: #f7fafc;
            padding: 1.5rem;
            border-radius: 8px;
            height: fit-content;
            border: 1px solid #e2e8f0;
        }
        .tech3-template .portfolio-links {
            font-size: 0.9rem;
        }
        .tech3-template .portfolio-item {
            margin-bottom: 0.8rem;
            padding: 0.8rem;
            background: white;
            border-radius: 6px;
            border-left: 3px solid #4c51bf;
        }
    </style>

    <script src="../script.js"></script>
</body>
</html>
