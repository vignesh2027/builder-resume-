<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 13 Resume Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="resume-template creative13-template">
    <div class="hexagon-header">
        <div class="hexagon-bg"></div>
        <div class="header-info">
            <h1 class="name" id="previewName">Your Name</h1>
            <h2 class="title" id="previewJobTitle">Professional Title</h2>
            <div class="contact-hexagon">
                <span id="previewEmail">email@example.com</span>
                <span id="previewPhone">+1 (555) 123-4567</span>
                <span id="previewLocation">Location</span>
                <div id="previewLinkedIn"></div>
            </div>
        </div>
    </div>
    <div class="main-content">
        <div class="summary-hexagon">
            <h3>Creative Summary</h3>
            <p id="previewSummary"></p>
        </div>
        <div class="content-grid">
            <div class="left-content">
                <div class="section">
                    <h3>Experience</h3>
                    <div id="previewExperience"></div>
                </div>
                <div class="section">
                    <h3>Education</h3>
                    <div id="previewEducation"></div>
                </div>
            </div>
            <div class="right-content">
                <div class="section">
                    <h3>Skills</h3>
                    <div id="previewSkills" class="skills-list"></div>
                </div>
                <div class="section">
                    <h3>Projects</h3>
                    <ul id="previewProjects"></ul>
                </div>
                <div class="section">
                    <h3>Languages</h3>
                    <div id="previewLanguages" class="skills-list"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<style>
.creative13-template { font-family: 'Open Sans', sans-serif; background: #fff; color: #333; }
.creative13-template .hexagon-header { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%); color: white; padding: 2rem; text-align: center; position: relative; overflow: hidden; }
.creative13-template .hexagon-bg { position: absolute; top: -40px; right: -40px; width: 160px; height: 160px; background: rgba(255,255,255,0.1); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); }
.creative13-template .header-info { position: relative; z-index: 2; }
.creative13-template .name { font-size: 2.5rem; margin: 0; font-weight: 700; }
.creative13-template .title { font-size: 1.2rem; margin: 0.5rem 0 1rem 0; opacity: 0.9; font-weight: 300; }
.creative13-template .contact-hexagon { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; font-size: 0.9rem; }
.creative13-template .main-content { padding: 2rem; }
.creative13-template .summary-hexagon { background: #f8f9fa; padding: 1.5rem; border-radius: 15px; margin-bottom: 2rem; border: 2px solid #ff6b6b; }
.creative13-template .summary-hexagon h3 { margin: 0 0 1rem 0; color: #ff6b6b; font-size: 1.2rem; }
.creative13-template .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
.creative13-template .section { margin-bottom: 2rem; }
.creative13-template h3 { color: #ff6b6b; font-size: 1.2rem; margin-bottom: 1rem; font-weight: 600; }
.creative13-template .experience-entry, .creative13-template .education-entry { margin-bottom: 1.5rem; padding: 1rem; background: white; border-radius: 10px; box-shadow: 0 2px 10px rgba(255,107,107,0.1); }
.creative13-template .entry-title { font-weight: bold; font-size: 1.1rem; color: #333; }
.creative13-template .entry-company { color: #ff6b6b; font-weight: 500; }
.creative13-template .entry-dates { color: #666; font-size: 0.9rem; }
.creative13-template .skills-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.creative13-template .skill-tag { background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%); color: white; padding: 0.4rem 1rem; border-radius: 25px; font-size: 0.85rem; }
</style>
</body>
</html>
