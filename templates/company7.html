<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Template 7</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template company7-template">
        <div class="header-section">
            <div class="header-content">
                <div class="name-section">
                    <h1 class="name" id="previewName">Your Name</h1>
                    <div class="accent-line"></div>
                    <h2 class="title" id="previewJobTitle">Professional Title</h2>
                </div>
                <div class="contact-section">
                    <div class="contact-item" id="previewEmail"></div>
                    <div class="contact-item" id="previewPhone"></div>
                    <div class="contact-item" id="previewLocation"></div>
                    <div class="contact-item" id="previewLinkedIn"></div>
                </div>
            </div>
        </div>
        
        <div class="content-area">
            <div class="summary-section">
                <h3>Professional Summary</h3>
                <p id="previewSummary"></p>
            </div>
            
            <div class="main-layout">
                <div class="primary-section">
                    <div class="section">
                        <h3>Professional Experience</h3>
                        <div id="previewExperience"></div>
                    </div>
                    
                    <div class="section">
                        <h3>Education</h3>
                        <div id="previewEducation"></div>
                    </div>
                </div>
                
                <div class="sidebar-section">
                    <div class="section">
                        <h3>Technical Skills</h3>
                        <div id="previewSkills" class="skills-list"></div>
                    </div>
                    
                    <div class="section">
                        <h3>Key Projects</h3>
                        <ul id="previewProjects"></ul>
                    </div>
                    
                    <div class="section">
                        <h3>Languages</h3>
                        <div id="previewLanguages" class="skills-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .company7-template { 
            font-family: 'Verdana', Geneva, Tahoma, sans-serif; 
            background: #ffffff; 
            color: #2c3e50; 
            line-height: 1.6; 
            max-width: 8.5in; 
            margin: 0 auto; 
        }
        .company7-template .header-section { 
            background: #f8f9fa; 
            padding: 2rem; 
            border-bottom: 3px solid #6c757d; 
        }
        .company7-template .header-content { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .company7-template .name { 
            font-size: 2.4rem; 
            margin: 0; 
            font-weight: 700; 
            color: #495057; 
            letter-spacing: 1px; 
        }
        .company7-template .accent-line { 
            width: 80px; 
            height: 3px; 
            background: #6c757d; 
            margin: 0.5rem 0; 
        }
        .company7-template .title { 
            font-size: 1.2rem; 
            margin: 0; 
            font-weight: 400; 
            color: #6c757d; 
        }
        .company7-template .contact-section { 
            text-align: right; 
            font-size: 0.95rem; 
        }
        .company7-template .contact-item { 
            margin-bottom: 0.5rem; 
            color: #495057; 
        }
        .company7-template .content-area { 
            padding: 2rem; 
        }
        .company7-template .summary-section { 
            background: #ffffff; 
            padding: 1.5rem; 
            margin-bottom: 2rem; 
            border: 1px solid #dee2e6; 
            border-left: 4px solid #6c757d; 
        }
        .company7-template .summary-section h3 { 
            margin: 0 0 1rem 0; 
            color: #495057; 
            font-size: 1.3rem; 
            font-weight: 600; 
        }
        .company7-template .main-layout { 
            display: grid; 
            grid-template-columns: 2fr 1fr; 
            gap: 2rem; 
        }
        .company7-template .section { 
            margin-bottom: 2rem; 
        }
        .company7-template h3 { 
            color: #495057; 
            font-size: 1.1rem; 
            margin-bottom: 1rem; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            border-bottom: 2px solid #dee2e6; 
            padding-bottom: 0.5rem; 
        }
        .company7-template .experience-entry, .company7-template .education-entry { 
            margin-bottom: 1.5rem; 
            padding-bottom: 1rem; 
            border-bottom: 1px solid #f1f3f4; 
        }
        .company7-template .entry-title { 
            font-weight: bold; 
            font-size: 1.1rem; 
            color: #495057; 
        }
        .company7-template .entry-company { 
            color: #6c757d; 
            font-weight: 500; 
        }
        .company7-template .entry-dates { 
            color: #6c757d; 
            font-size: 0.9rem; 
        }
        .company7-template .skills-list { 
            display: block; 
        }
        .company7-template .skill-tag { 
            display: inline-block; 
            background: #6c757d; 
            color: white; 
            padding: 0.3rem 0.8rem; 
            margin: 0.2rem; 
            border-radius: 4px; 
            font-size: 0.85rem; 
            font-weight: 500; 
        }
    </style>

    <script src="../script.js"></script>
</body>
</html>
