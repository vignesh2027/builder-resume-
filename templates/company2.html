<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Template 2</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template company2-template">
        <div class="sidebar">
            <div class="profile-section">
                <h1 class="name" id="previewName">Your Name</h1>
                <h2 class="title" id="previewJobTitle">Professional Title</h2>
            </div>
            
            <div class="contact-section">
                <h3>Contact</h3>
                <div class="contact-item" id="previewEmail"></div>
                <div class="contact-item" id="previewPhone"></div>
                <div class="contact-item" id="previewLocation"></div>
                <div class="contact-item" id="previewLinkedIn"></div>
            </div>
            
            <div class="section">
                <h3>Core Skills</h3>
                <div id="previewSkills" class="skills-list"></div>
            </div>
            
            <div class="section">
                <h3>Languages</h3>
                <div id="previewLanguages" class="skills-list"></div>
            </div>
        </div>
        
        <div class="main-section">
            <div class="summary-section">
                <h3>Professional Summary</h3>
                <p id="previewSummary"></p>
            </div>
            
            <div class="section">
                <h3>Professional Experience</h3>
                <div id="previewExperience"></div>
            </div>
            
            <div class="section">
                <h3>Education</h3>
                <div id="previewEducation"></div>
            </div>
            
            <div class="section">
                <h3>Key Projects</h3>
                <ul id="previewProjects"></ul>
            </div>
        </div>
    </div>

    <style>
        .company2-template { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #ffffff; 
            color: #333333; 
            line-height: 1.6; 
            max-width: 8.5in; 
            margin: 0 auto; 
            display: grid; 
            grid-template-columns: 1fr 2fr; 
        }
        .company2-template .sidebar { 
            background: #2c3e50; 
            color: white; 
            padding: 2rem 1.5rem; 
        }
        .company2-template .profile-section { 
            text-align: center; 
            margin-bottom: 2rem; 
            padding-bottom: 2rem; 
            border-bottom: 2px solid #34495e; 
        }
        .company2-template .name { 
            font-size: 2.2rem; 
            margin: 0; 
            font-weight: 700; 
            letter-spacing: 1px; 
        }
        .company2-template .title { 
            font-size: 1.1rem; 
            margin: 1rem 0 0 0; 
            font-weight: 400; 
            opacity: 0.9; 
        }
        .company2-template .sidebar .section { 
            margin-bottom: 2rem; 
        }
        .company2-template .sidebar h3 { 
            color: #ecf0f1; 
            font-size: 1.1rem; 
            margin-bottom: 1rem; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            border-bottom: 1px solid #34495e; 
            padding-bottom: 0.5rem; 
        }
        .company2-template .contact-section { 
            margin-bottom: 2rem; 
        }
        .company2-template .contact-item { 
            margin-bottom: 0.8rem; 
            font-size: 0.9rem; 
        }
        .company2-template .main-section { 
            padding: 2rem; 
        }
        .company2-template .main-section .section { 
            margin-bottom: 2rem; 
        }
        .company2-template .main-section h3 { 
            color: #2c3e50; 
            font-size: 1.3rem; 
            margin-bottom: 1rem; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            border-bottom: 3px solid #2c3e50; 
            padding-bottom: 0.5rem; 
        }
        .company2-template .summary-section { 
            background: #f8f9fa; 
            padding: 1.5rem; 
            border-radius: 8px; 
            margin-bottom: 2rem; 
        }
        .company2-template .experience-entry, .company2-template .education-entry { 
            margin-bottom: 1.5rem; 
            padding-bottom: 1rem; 
            border-bottom: 1px solid #dee2e6; 
        }
        .company2-template .entry-title { 
            font-weight: bold; 
            font-size: 1.1rem; 
            color: #2c3e50; 
        }
        .company2-template .entry-company { 
            color: #495057; 
            font-weight: 500; 
        }
        .company2-template .entry-dates { 
            color: #6c757d; 
            font-size: 0.9rem; 
        }
        .company2-template .sidebar .skills-list { 
            display: block; 
        }
        .company2-template .sidebar .skill-tag { 
            display: block; 
            background: #34495e; 
            color: white; 
            padding: 0.5rem; 
            margin: 0.3rem 0; 
            border-radius: 4px; 
            font-size: 0.85rem; 
            text-align: center; 
        }
    </style>

    <script src="../script.js"></script>
</body>
</html>
