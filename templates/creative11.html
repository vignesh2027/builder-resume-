<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 11 Resume Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="resume-template creative11-template">
    <div class="star-header">
        <div class="star-bg"></div>
        <div class="header-info">
            <h1 class="name" id="previewName">Your Name</h1>
            <h2 class="title" id="previewJobTitle">Professional Title</h2>
            <div class="contact-star">
                <span id="previewEmail">email@example.com</span>
                <span id="previewPhone">+1 (555) 123-4567</span>
                <span id="previewLocation">Location</span>
                <div id="previewLinkedIn"></div>
            </div>
        </div>
    </div>
    <div class="main-content">
        <div class="summary-star">
            <h3>Creative Summary</h3>
            <p id="previewSummary"></p>
        </div>
        <div class="content-grid">
            <div class="left-content">
                <div class="section">
                    <h3>Experience</h3>
                    <div id="previewExperience"></div>
                </div>
                <div class="section">
                    <h3>Education</h3>
                    <div id="previewEducation"></div>
                </div>
            </div>
            <div class="right-content">
                <div class="section">
                    <h3>Skills</h3>
                    <div id="previewSkills" class="skills-list"></div>
                </div>
                <div class="section">
                    <h3>Projects</h3>
                    <ul id="previewProjects"></ul>
                </div>
                <div class="section">
                    <h3>Languages</h3>
                    <div id="previewLanguages" class="skills-list"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<style>
.creative11-template { font-family: 'Source Sans Pro', sans-serif; background: #fff; color: #333; }
.creative11-template .star-header { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%); color: #333; padding: 2rem; text-align: center; position: relative; overflow: hidden; }
.creative11-template .star-bg { position: absolute; top: 20px; right: 30px; width: 80px; height: 80px; background: rgba(255,255,255,0.2); clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
.creative11-template .header-info { position: relative; z-index: 2; }
.creative11-template .name { font-size: 2.5rem; margin: 0; font-weight: 700; color: #2c3e50; }
.creative11-template .title { font-size: 1.2rem; margin: 0.5rem 0 1rem 0; opacity: 0.8; font-weight: 300; color: #34495e; }
.creative11-template .contact-star { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; font-size: 0.9rem; color: #2c3e50; }
.creative11-template .main-content { padding: 2rem; }
.creative11-template .summary-star { background: #f8f9fa; padding: 1.5rem; border-radius: 15px; margin-bottom: 2rem; border: 2px solid #ff9a9e; }
.creative11-template .summary-star h3 { margin: 0 0 1rem 0; color: #ff9a9e; font-size: 1.2rem; }
.creative11-template .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
.creative11-template .section { margin-bottom: 2rem; }
.creative11-template h3 { color: #ff9a9e; font-size: 1.2rem; margin-bottom: 1rem; font-weight: 600; }
.creative11-template .experience-entry, .creative11-template .education-entry { margin-bottom: 1.5rem; padding: 1rem; background: white; border-radius: 10px; box-shadow: 0 2px 10px rgba(255,154,158,0.1); }
.creative11-template .entry-title { font-weight: bold; font-size: 1.1rem; color: #333; }
.creative11-template .entry-company { color: #ff9a9e; font-weight: 500; }
.creative11-template .entry-dates { color: #666; font-size: 0.9rem; }
.creative11-template .skills-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.creative11-template .skill-tag { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: #2c3e50; padding: 0.4rem 1rem; border-radius: 25px; font-size: 0.85rem; font-weight: 500; }
</style>
</body>
</html>
