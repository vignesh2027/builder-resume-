<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Minimal Template</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template executive-minimal-template">
        <div class="header">
            <h1 class="name" id="previewName">Your Name</h1>
            <div class="contact-info">
                <span id="previewEmail"></span>
                <span id="previewPhone"></span>
                <span id="previewLocation"></span>
                <span id="previewLinkedIn"></span>
            </div>
        </div>
        
        <div class="section">
            <h2>Executive Summary</h2>
            <p id="previewSummary"></p>
        </div>
        
        <div class="section">
            <h2>Professional Experience</h2>
            <div id="previewExperience"></div>
        </div>
        
        <div class="section">
            <h2>Education</h2>
            <div id="previewEducation"></div>
        </div>
        
        <div class="section">
            <h2>Core Competencies</h2>
            <div id="previewSkills"></div>
        </div>
    </div>

    <style>
        .executive-minimal-template { 
            font-family: 'Arial', sans-serif; 
            background: #ffffff; 
            color: #000000; 
            line-height: 1.5; 
            max-width: 8.5in; 
            margin: 0 auto; 
            padding: 1in;
        }
        .executive-minimal-template .header { 
            text-align: center; 
            margin-bottom: 2rem; 
            border-bottom: 2px solid #000000;
            padding-bottom: 1rem;
        }
        .executive-minimal-template .name { 
            font-size: 2.2rem; 
            margin: 0 0 0.5rem 0; 
            font-weight: bold; 
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .executive-minimal-template .contact-info { 
            font-size: 1rem; 
            color: #333333;
        }
        .executive-minimal-template .contact-info span { 
            margin: 0 1rem; 
        }
        .executive-minimal-template .section { 
            margin-bottom: 2rem; 
        }
        .executive-minimal-template h2 { 
            color: #000000; 
            font-size: 1.4rem; 
            margin-bottom: 1rem; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .executive-minimal-template .experience-entry, .executive-minimal-template .education-entry { 
            margin-bottom: 1.5rem; 
        }
        .executive-minimal-template .entry-title { 
            font-weight: bold; 
            font-size: 1.1rem; 
            color: #000000; 
            margin-bottom: 0.2rem;
        }
        .executive-minimal-template .entry-company { 
            color: #333333; 
            font-weight: normal; 
            font-size: 1rem;
        }
        .executive-minimal-template .entry-dates { 
            color: #666666; 
            font-size: 0.9rem; 
            margin-top: 0.2rem;
        }
        .executive-minimal-template .skills-list { 
            display: block; 
        }
        .executive-minimal-template .skill-tag { 
            display: inline-block; 
            background: transparent; 
            color: #333333; 
            padding: 0.2rem 0.5rem; 
            margin: 0.2rem 0.5rem 0.2rem 0; 
            font-size: 1rem; 
            border: 1px solid #cccccc;
        }
    </style>

    <script src="../script.js"></script>
</body>
</html>
