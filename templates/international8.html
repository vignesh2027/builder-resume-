<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>International Resume Template 8</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template international8-template">
        <div class="top-section">
            <div class="name-block">
                <h1 class="name" id="previewName">Your Name</h1>
                <h2 class="title" id="previewJobTitle">Professional Title</h2>
            </div>
            <div class="contact-block">
                <div class="contact-item" id="previewEmail"></div>
                <div class="contact-item" id="previewPhone"></div>
                <div class="contact-item" id="previewLocation"></div>
                <div class="contact-item" id="previewLinkedIn"></div>
            </div>
        </div>
        <div class="profile-section">
            <h3>Professional Profile</h3>
            <p id="previewSummary"></p>
        </div>
        <div class="main-layout">
            <div class="primary-content">
                <div class="section">
                    <h3>Career History</h3>
                    <div id="previewExperience"></div>
                </div>
                <div class="section">
                    <h3>Academic Background</h3>
                    <div id="previewEducation"></div>
                </div>
            </div>
            <div class="sidebar-content">
                <div class="section">
                    <h3>Professional Skills</h3>
                    <div id="previewSkills" class="skills-list"></div>
                </div>
                <div class="section">
                    <h3>Languages</h3>
                    <div id="previewLanguages" class="skills-list"></div>
                </div>
                <div class="section">
                    <h3>Projects</h3>
                    <ul id="previewProjects"></ul>
                </div>
            </div>
        </div>
    </div>
    <style>
        .international8-template { font-family: 'Trebuchet MS', sans-serif; background: #fff; color: #2c3e50; }
        .international8-template .top-section { display: flex; justify-content: space-between; align-items: center; padding: 2rem; background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white; }
        .international8-template .name { font-size: 2.6rem; margin: 0; font-weight: 600; }
        .international8-template .title { font-size: 1.2rem; margin: 0.5rem 0; opacity: 0.9; font-weight: 300; }
        .international8-template .contact-block { text-align: right; }
        .international8-template .contact-item { margin-bottom: 0.5rem; font-size: 0.9rem; opacity: 0.9; }
        .international8-template .profile-section { padding: 2rem; background: #f8f9fa; border-left: 5px solid #6c5ce7; }
        .international8-template .profile-section h3 { margin: 0 0 1rem 0; color: #6c5ce7; font-size: 1.3rem; font-weight: 600; }
        .international8-template .main-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; padding: 2rem; }
        .international8-template .section { margin-bottom: 2rem; }
        .international8-template h3 { color: #6c5ce7; font-size: 1.2rem; margin-bottom: 1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #ddd6fe; padding-bottom: 0.5rem; }
        .international8-template .experience-entry, .international8-template .education-entry { margin-bottom: 1.5rem; }
        .international8-template .entry-title { font-weight: bold; font-size: 1.1rem; color: #2c3e50; }
        .international8-template .entry-company { color: #6c5ce7; font-weight: 600; margin: 0.3rem 0; }
        .international8-template .entry-dates { color: #74b9ff; font-size: 0.9rem; }
        .international8-template .skills-list { display: block; }
        .international8-template .skill-tag { display: inline-block; background: #ddd6fe; color: #6c5ce7; padding: 0.4rem 0.8rem; margin: 0.2rem; border-radius: 20px; font-size: 0.85rem; font-weight: 500; border: 1px solid #a29bfe; }
    </style>
    <script src="../script.js"></script>
</body>
</html>
