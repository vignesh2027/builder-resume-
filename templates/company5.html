<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Template 5</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template company5-template">
        <div class="header-section">
            <div class="header-bar"></div>
            <div class="header-content">
                <h1 class="name" id="previewName">Your Name</h1>
                <h2 class="title" id="previewJobTitle">Professional Title</h2>
                <div class="contact-info">
                    <span class="contact-item" id="previewEmail"></span>
                    <span class="separator">|</span>
                    <span class="contact-item" id="previewPhone"></span>
                    <span class="separator">|</span>
                    <span class="contact-item" id="previewLocation"></span>
                    <span class="separator">|</span>
                    <span class="contact-item" id="previewLinkedIn"></span>
                </div>
            </div>
        </div>
        
        <div class="content-section">
            <div class="summary-section">
                <h3>Professional Summary</h3>
                <p id="previewSummary"></p>
            </div>
            
            <div class="main-grid">
                <div class="primary-column">
                    <div class="section">
                        <h3>Professional Experience</h3>
                        <div id="previewExperience"></div>
                    </div>
                    
                    <div class="section">
                        <h3>Education</h3>
                        <div id="previewEducation"></div>
                    </div>
                </div>
                
                <div class="secondary-column">
                    <div class="section">
                        <h3>Technical Skills</h3>
                        <div id="previewSkills" class="skills-list"></div>
                    </div>
                    
                    <div class="section">
                        <h3>Key Projects</h3>
                        <ul id="previewProjects"></ul>
                    </div>
                    
                    <div class="section">
                        <h3>Languages</h3>
                        <div id="previewLanguages" class="skills-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .company5-template { 
            font-family: 'Georgia', serif; 
            background: #ffffff; 
            color: #1a1a1a; 
            line-height: 1.6; 
            max-width: 8.5in; 
            margin: 0 auto; 
        }
        .company5-template .header-section { 
            position: relative; 
            background: #ffffff; 
            padding: 2rem; 
            text-align: center; 
        }
        .company5-template .header-bar { 
            position: absolute; 
            top: 0; 
            left: 0; 
            right: 0; 
            height: 8px; 
            background: linear-gradient(90deg, #34495e 0%, #2c3e50 100%); 
        }
        .company5-template .name { 
            font-size: 2.8rem; 
            margin: 1rem 0 0.5rem 0; 
            font-weight: 400; 
            color: #2c3e50; 
            letter-spacing: 2px; 
        }
        .company5-template .title { 
            font-size: 1.3rem; 
            margin: 0 0 1.5rem 0; 
            font-weight: 300; 
            color: #34495e; 
            font-style: italic; 
        }
        .company5-template .contact-info { 
            font-size: 1rem; 
            color: #2c3e50; 
        }
        .company5-template .separator { 
            margin: 0 1rem; 
            color: #bdc3c7; 
        }
        .company5-template .content-section { 
            padding: 2rem; 
        }
        .company5-template .summary-section { 
            margin-bottom: 2rem; 
            padding: 1.5rem; 
            background: #f8f9fa; 
            border: 1px solid #dee2e6; 
        }
        .company5-template .summary-section h3 { 
            margin: 0 0 1rem 0; 
            color: #2c3e50; 
            font-size: 1.3rem; 
            font-weight: 500; 
        }
        .company5-template .main-grid { 
            display: grid; 
            grid-template-columns: 2fr 1fr; 
            gap: 2rem; 
        }
        .company5-template .section { 
            margin-bottom: 2rem; 
        }
        .company5-template h3 { 
            color: #2c3e50; 
            font-size: 1.2rem; 
            margin-bottom: 1rem; 
            font-weight: 500; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            position: relative; 
            padding-bottom: 0.5rem; 
        }
        .company5-template h3::after { 
            content: ''; 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            width: 50px; 
            height: 2px; 
            background: #2c3e50; 
        }
        .company5-template .experience-entry, .company5-template .education-entry { 
            margin-bottom: 1.5rem; 
            padding-bottom: 1rem; 
            border-bottom: 1px solid #e9ecef; 
        }
        .company5-template .entry-title { 
            font-weight: 600; 
            font-size: 1.1rem; 
            color: #2c3e50; 
        }
        .company5-template .entry-company { 
            color: #34495e; 
            font-weight: 400; 
            font-style: italic; 
        }
        .company5-template .entry-dates { 
            color: #6c757d; 
            font-size: 0.9rem; 
        }
        .company5-template .skills-list { 
            display: block; 
        }
        .company5-template .skill-tag { 
            display: inline-block; 
            background: #2c3e50; 
            color: white; 
            padding: 0.4rem 0.8rem; 
            margin: 0.2rem; 
            font-size: 0.85rem; 
            font-weight: 400; 
        }
    </style>

    <script src="../script.js"></script>
</body>
</html>
