<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Modern Template</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template elegant-modern-template">
        <div class="header-section">
            <h1 class="name" id="previewName">Your Name</h1>
            <h2 class="title" id="previewJobTitle">Professional Title</h2>
            <div class="contact-info">
                <span id="previewEmail"></span> • <span id="previewPhone"></span> • <span id="previewLocation"></span> • <span id="previewLinkedIn"></span>
            </div>
        </div>
        
        <div class="content-wrapper">
            <div class="section">
                <h3>Professional Summary</h3>
                <p id="previewSummary"></p>
            </div>
            
            <div class="section">
                <h3>Professional Experience</h3>
                <div id="previewExperience"></div>
            </div>
            
            <div class="dual-section">
                <div class="left-column">
                    <div class="section">
                        <h3>Education</h3>
                        <div id="previewEducation"></div>
                    </div>
                </div>
                
                <div class="right-column">
                    <div class="section">
                        <h3>Core Skills</h3>
                        <div id="previewSkills" class="skills-list"></div>
                    </div>
                    
                    <div class="section">
                        <h3>Languages</h3>
                        <div id="previewLanguages" class="skills-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .elegant-modern-template { 
            font-family: 'Georgia', serif; 
            background: #ffffff; 
            color: #2c3e50; 
            line-height: 1.7; 
            max-width: 8.5in; 
            margin: 0 auto; 
        }
        .elegant-modern-template .header-section { 
            text-align: center; 
            padding: 3rem 2rem 2rem; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-bottom: 3px solid #d4af37;
            position: relative;
        }
        .elegant-modern-template .header-section:after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 1px;
            background: #d4af37;
        }
        .elegant-modern-template .name { 
            font-size: 3rem; 
            margin: 0 0 0.5rem 0; 
            font-weight: normal; 
            color: #2c3e50;
            letter-spacing: 1px;
        }
        .elegant-modern-template .title { 
            font-size: 1.3rem; 
            margin: 0 0 1.5rem 0; 
            font-weight: normal; 
            color: #34495e; 
            font-style: italic;
        }
        .elegant-modern-template .contact-info { 
            font-size: 1rem; 
            color: #555; 
        }
        .elegant-modern-template .content-wrapper { 
            padding: 2.5rem 3rem; 
        }
        .elegant-modern-template .section { 
            margin-bottom: 2.5rem; 
        }
        .elegant-modern-template h3 { 
            color: #2c3e50; 
            font-size: 1.3rem; 
            margin-bottom: 1.5rem; 
            font-weight: normal; 
            position: relative;
            padding-bottom: 0.5rem;
        }
        .elegant-modern-template h3:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 50px;
            height: 1px;
            background: #d4af37;
        }
        .elegant-modern-template .dual-section { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 3rem; 
        }
        .elegant-modern-template .experience-entry, .elegant-modern-template .education-entry { 
            margin-bottom: 2rem; 
            padding-bottom: 1.5rem;
            position: relative;
        }
        .elegant-modern-template .experience-entry:not(:last-child):after, .elegant-modern-template .education-entry:not(:last-child):after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 30px;
            height: 1px;
            background: #ecf0f1;
        }
        .elegant-modern-template .entry-title { 
            font-weight: normal; 
            font-size: 1.2rem; 
            color: #2c3e50; 
            margin-bottom: 0.5rem;
        }
        .elegant-modern-template .entry-company { 
            color: #d4af37; 
            font-weight: normal; 
            font-size: 1rem;
            font-style: italic;
        }
        .elegant-modern-template .entry-dates { 
            color: #666; 
            font-size: 0.9rem; 
            margin-top: 0.5rem;
        }
        .elegant-modern-template .skills-list { 
            display: block; 
        }
        .elegant-modern-template .skill-tag { 
            display: inline-block; 
            background: transparent; 
            color: #2c3e50; 
            padding: 0.3rem 0; 
            margin: 0.3rem 0.8rem 0.3rem 0; 
            font-size: 1rem; 
            font-weight: normal; 
            border-bottom: 1px solid #d4af37;
        }
    </style>

    <script src="../script.js"></script>
</body>
</html>
