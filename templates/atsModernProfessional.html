<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Modern Professional Template</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template ats-modern-professional-template">
        <div class="header">
            <h1 class="name" id="previewName">Your Name</h1>
            <div class="contact-info">
                <span id="previewEmail"></span> | 
                <span id="previewPhone"></span> | 
                <span id="previewLocation"></span> | 
                <span id="previewLinkedIn"></span>
            </div>
        </div>
        
        <div class="section">
            <h2>Professional Summary</h2>
            <p id="previewSummary"></p>
        </div>
        
        <div class="section">
            <h2>Professional Experience</h2>
            <div id="previewExperience"></div>
        </div>
        
        <div class="section">
            <h2>Education</h2>
            <div id="previewEducation"></div>
        </div>
        
        <div class="section">
            <h2>Core Skills</h2>
            <div id="previewSkills"></div>
        </div>
    </div>

    <style>
        .ats-modern-professional-template { 
            font-family: 'Arial', sans-serif; 
            background: #ffffff; 
            color: #000000; 
            line-height: 1.5; 
            max-width: 8.5in; 
            margin: 0 auto; 
            padding: 1in;
        }
        .ats-modern-professional-template .header { 
            text-align: center; 
            margin-bottom: 2rem; 
        }
        .ats-modern-professional-template .name { 
            font-size: 2.5rem; 
            margin: 0 0 0.5rem 0; 
            font-weight: bold; 
            color: #000000;
        }
        .ats-modern-professional-template .contact-info { 
            font-size: 1rem; 
            color: #000000;
        }
        .ats-modern-professional-template .section { 
            margin-bottom: 2rem; 
            padding-bottom: 1rem;
            border-bottom: 1px solid #e0e0e0;
        }
        .ats-modern-professional-template .section:last-child {
            border-bottom: none;
        }
        .ats-modern-professional-template h2 { 
            color: #000000; 
            font-size: 1.5rem; 
            margin-bottom: 1rem; 
            font-weight: bold; 
        }
        .ats-modern-professional-template .experience-entry, .ats-modern-professional-template .education-entry { 
            margin-bottom: 1.5rem; 
        }
        .ats-modern-professional-template .entry-title { 
            font-weight: bold; 
            font-size: 1.1rem; 
            color: #000000; 
            margin-bottom: 0.2rem;
        }
        .ats-modern-professional-template .entry-company { 
            color: #000000; 
            font-weight: normal; 
            font-size: 1rem;
        }
        .ats-modern-professional-template .entry-dates { 
            color: #666666; 
            font-size: 1rem; 
            margin-top: 0.2rem;
        }
        .ats-modern-professional-template .skills-list { 
            display: block; 
        }
        .ats-modern-professional-template .skill-tag { 
            display: inline-block; 
            color: #000000; 
            padding: 0.3rem 0.8rem; 
            margin: 0.2rem 0.3rem 0.2rem 0; 
            font-size: 1rem; 
            border: 1px solid #cccccc;
            background: #f9f9f9;
        }
    </style>

    <script src="../script.js"></script>
</body>
</html>
