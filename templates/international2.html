<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>International Resume Template 2</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template international2-template">
        <div class="sidebar">
            <div class="profile-section">
                <div class="profile-photo-placeholder"></div>
                <h1 class="name" id="previewName">Your Name</h1>
                <h2 class="title" id="previewJobTitle">Professional Title</h2>
            </div>
            <div class="contact-section">
                <h3>Contact</h3>
                <div class="contact-item" id="previewEmail"></div>
                <div class="contact-item" id="previewPhone"></div>
                <div class="contact-item" id="previewLocation"></div>
                <div class="contact-item" id="previewLinkedIn"></div>
            </div>
            <div class="section">
                <h3>Skills</h3>
                <div id="previewSkills" class="skills-list"></div>
            </div>
            <div class="section">
                <h3>Languages</h3>
                <div id="previewLanguages" class="skills-list"></div>
            </div>
        </div>
        <div class="main-content">
            <div class="section">
                <h3>Professional Summary</h3>
                <p id="previewSummary"></p>
            </div>
            <div class="section">
                <h3>Professional Experience</h3>
                <div id="previewExperience"></div>
            </div>
            <div class="section">
                <h3>Education</h3>
                <div id="previewEducation"></div>
            </div>
            <div class="section">
                <h3>Key Projects</h3>
                <ul id="previewProjects"></ul>
            </div>
        </div>
    </div>
    <style>
        .international2-template { font-family: 'Georgia', serif; background: #fff; color: #2c2c2c; display: flex; }
        .international2-template .sidebar { width: 300px; background: #f8f9fa; padding: 2rem 1.5rem; border-right: 1px solid #dee2e6; }
        .international2-template .profile-photo-placeholder { width: 100px; height: 100px; border-radius: 50%; background: #6c757d; margin: 0 auto 1rem; }
        .international2-template .name { font-size: 1.8rem; margin: 0 0 0.5rem 0; font-weight: 600; text-align: center; color: #495057; }
        .international2-template .title { font-size: 1rem; margin: 0 0 2rem 0; text-align: center; color: #6c757d; font-style: italic; }
        .international2-template .sidebar h3 { color: #495057; font-size: 1.1rem; margin: 2rem 0 1rem 0; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #6c757d; padding-bottom: 0.5rem; }
        .international2-template .contact-item { margin-bottom: 0.8rem; font-size: 0.9rem; color: #495057; }
        .international2-template .main-content { flex: 1; padding: 2rem; }
        .international2-template .main-content .section { margin-bottom: 2.5rem; }
        .international2-template .main-content h3 { color: #495057; font-size: 1.4rem; margin-bottom: 1rem; font-weight: 600; border-bottom: 3px solid #6c757d; padding-bottom: 0.5rem; }
        .international2-template .experience-entry, .international2-template .education-entry { margin-bottom: 2rem; }
        .international2-template .entry-title { font-weight: bold; font-size: 1.2rem; color: #495057; }
        .international2-template .entry-company { color: #6c757d; font-weight: 500; margin: 0.3rem 0; font-style: italic; }
        .international2-template .entry-dates { color: #868e96; font-size: 0.9rem; }
        .international2-template .skills-list { display: block; }
        .international2-template .skill-tag { display: block; background: none; color: #495057; padding: 0.3rem 0; margin: 0.2rem 0; font-size: 0.9rem; border-left: 3px solid #6c757d; padding-left: 0.8rem; }
    </style>
    <script src="../script.js"></script>
</body>
</html>
