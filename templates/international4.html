<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>International Resume Template 4</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template international4-template">
        <div class="header-section">
            <div class="name-section">
                <h1 class="name" id="previewName">Your Name</h1>
                <h2 class="title" id="previewJobTitle">Professional Title</h2>
            </div>
            <div class="contact-section">
                <div class="contact-item" id="previewEmail"></div>
                <div class="contact-item" id="previewPhone"></div>
                <div class="contact-item" id="previewLocation"></div>
                <div class="contact-item" id="previewLinkedIn"></div>
            </div>
        </div>
        <div class="content-wrapper">
            <div class="section">
                <h3>Professional Profile</h3>
                <p id="previewSummary"></p>
            </div>
            <div class="two-column">
                <div class="left-content">
                    <div class="section">
                        <h3>Employment History</h3>
                        <div id="previewExperience"></div>
                    </div>
                    <div class="section">
                        <h3>Education</h3>
                        <div id="previewEducation"></div>
                    </div>
                </div>
                <div class="right-content">
                    <div class="section">
                        <h3>Key Skills</h3>
                        <div id="previewSkills" class="skills-list"></div>
                    </div>
                    <div class="section">
                        <h3>Languages</h3>
                        <div id="previewLanguages" class="skills-list"></div>
                    </div>
                    <div class="section">
                        <h3>Projects</h3>
                        <ul id="previewProjects"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <style>
        .international4-template { font-family: 'Times New Roman', serif; background: #fff; color: #2c2c2c; }
        .international4-template .header-section { display: flex; justify-content: space-between; align-items: center; padding: 2rem; border-bottom: 2px solid #8b4513; }
        .international4-template .name { font-size: 2.5rem; margin: 0; font-weight: 400; color: #8b4513; }
        .international4-template .title { font-size: 1.2rem; margin: 0.5rem 0; color: #a0522d; font-style: italic; }
        .international4-template .contact-section { text-align: right; }
        .international4-template .contact-item { margin-bottom: 0.5rem; font-size: 0.9rem; color: #654321; }
        .international4-template .content-wrapper { padding: 2rem; }
        .international4-template .two-column { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
        .international4-template .section { margin-bottom: 2rem; }
        .international4-template h3 { color: #8b4513; font-size: 1.3rem; margin-bottom: 1rem; font-weight: 600; text-transform: capitalize; border-bottom: 1px solid #deb887; padding-bottom: 0.5rem; }
        .international4-template .experience-entry, .international4-template .education-entry { margin-bottom: 1.5rem; }
        .international4-template .entry-title { font-weight: bold; font-size: 1.1rem; color: #654321; }
        .international4-template .entry-company { color: #8b4513; font-weight: 500; margin: 0.3rem 0; font-style: italic; }
        .international4-template .entry-dates { color: #a0522d; font-size: 0.9rem; }
        .international4-template .skills-list { display: block; }
        .international4-template .skill-tag { display: inline-block; background: #f5deb3; color: #8b4513; padding: 0.3rem 0.8rem; margin: 0.2rem; border-radius: 4px; font-size: 0.85rem; border: 1px solid #deb887; }
    </style>
    <script src="../script.js"></script>
</body>
</html>
