<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Executive Minimal Template</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template ats-executive-minimal-template">
        <div class="header">
            <h1 class="name" id="previewName">Your Name</h1>
            <div class="contact-info">
                <span id="previewEmail"></span> | 
                <span id="previewPhone"></span> | 
                <span id="previewLocation"></span> | 
                <span id="previewLinkedIn"></span>
            </div>
        </div>
        
        <div class="section">
            <h2>Executive Summary</h2>
            <p id="previewSummary"></p>
        </div>
        
        <div class="section">
            <h2>Leadership Experience</h2>
            <div id="previewExperience"></div>
        </div>
        
        <div class="section">
            <h2>Education</h2>
            <div id="previewEducation"></div>
        </div>
        
        <div class="section">
            <h2>Core Competencies</h2>
            <div id="previewSkills"></div>
        </div>
    </div>

    <style>
        .ats-executive-minimal-template { 
            font-family: 'Arial', sans-serif; 
            background: #ffffff; 
            color: #000000; 
            line-height: 1.4; 
            max-width: 8.5in; 
            margin: 0 auto; 
            padding: 1in;
        }
        .ats-executive-minimal-template .header { 
            text-align: center; 
            margin-bottom: 2rem; 
        }
        .ats-executive-minimal-template .name { 
            font-size: 3rem; 
            margin: 0 0 0.5rem 0; 
            font-weight: bold; 
            color: #000000;
        }
        .ats-executive-minimal-template .contact-info { 
            font-size: 1.1rem; 
            color: #000000;
        }
        .ats-executive-minimal-template .section { 
            margin-bottom: 2.5rem; 
        }
        .ats-executive-minimal-template h2 { 
            color: #000000; 
            font-size: 1.8rem; 
            margin-bottom: 1.2rem; 
            font-weight: bold; 
        }
        .ats-executive-minimal-template .experience-entry, .ats-executive-minimal-template .education-entry { 
            margin-bottom: 2rem; 
        }
        .ats-executive-minimal-template .entry-title { 
            font-weight: bold; 
            font-size: 1.3rem; 
            color: #000000; 
            margin-bottom: 0.3rem;
        }
        .ats-executive-minimal-template .entry-company { 
            color: #000000; 
            font-weight: normal; 
            font-size: 1.1rem;
        }
        .ats-executive-minimal-template .entry-dates { 
            color: #666666; 
            font-size: 1rem; 
            margin-top: 0.3rem;
        }
        .ats-executive-minimal-template .skills-list { 
            display: block; 
        }
        .ats-executive-minimal-template .skill-tag { 
            display: inline-block; 
            color: #000000; 
            font-size: 1.1rem; 
            margin: 0.3rem 1rem 0.3rem 0;
            font-weight: 500;
        }
    </style>

    <script src="../script.js"></script>
</body>
</html>
