<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Legal Finance Ready Template</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template ats-legal-finance-ready-template">
        <div class="header">
            <h1 class="name" id="previewName">Your Name</h1>
            <div class="contact-info">
                <div id="previewEmail"></div>
                <div id="previewPhone"></div>
                <div id="previewLocation"></div>
                <div id="previewLinkedIn"></div>
            </div>
        </div>
        
        <div class="section">
            <h2>Professional Summary</h2>
            <p id="previewSummary"></p>
        </div>
        
        <div class="section">
            <h2>Professional Experience</h2>
            <div id="previewExperience"></div>
        </div>
        
        <div class="section">
            <h2>Education</h2>
            <div id="previewEducation"></div>
        </div>
        
        <div class="section">
            <h2>Professional Skills</h2>
            <div id="previewSkills"></div>
        </div>
    </div>

    <style>
        .ats-legal-finance-ready-template { 
            font-family: 'Times New Roman', serif; 
            background: #ffffff; 
            color: #000000; 
            line-height: 1.8; 
            max-width: 8.5in; 
            margin: 0 auto; 
            padding: 1.2in;
        }
        .ats-legal-finance-ready-template .header { 
            text-align: center; 
            margin-bottom: 2.5rem; 
        }
        .ats-legal-finance-ready-template .name { 
            font-size: 1.8rem; 
            margin: 0 0 1rem 0; 
            font-weight: bold; 
            color: #000000;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .ats-legal-finance-ready-template .contact-info div { 
            font-size: 1rem; 
            color: #000000;
            margin: 0.3rem 0;
        }
        .ats-legal-finance-ready-template .section { 
            margin-bottom: 2.5rem; 
        }
        .ats-legal-finance-ready-template h2 { 
            color: #000000; 
            font-size: 1.1rem; 
            margin-bottom: 1.5rem; 
            font-weight: bold; 
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 1px;
        }
        .ats-legal-finance-ready-template .experience-entry, .ats-legal-finance-ready-template .education-entry { 
            margin-bottom: 2rem; 
        }
        .ats-legal-finance-ready-template .entry-title { 
            font-weight: bold; 
            font-size: 1rem; 
            color: #000000; 
            margin-bottom: 0.3rem;
        }
        .ats-legal-finance-ready-template .entry-company { 
            color: #000000; 
            font-weight: normal; 
            font-size: 1rem;
            font-style: italic;
        }
        .ats-legal-finance-ready-template .entry-dates { 
            color: #000000; 
            font-size: 1rem; 
            margin-top: 0.3rem;
        }
        .ats-legal-finance-ready-template .skills-list { 
            display: block; 
            text-align: justify;
        }
        .ats-legal-finance-ready-template .skill-tag { 
            display: inline; 
            color: #000000; 
            font-size: 1rem; 
        }
        .ats-legal-finance-ready-template .skill-tag:after {
            content: "; ";
        }
        .ats-legal-finance-ready-template .skill-tag:last-child:after {
            content: ".";
        }
    </style>

    <script src="../script.js"></script>
</body>
</html>
