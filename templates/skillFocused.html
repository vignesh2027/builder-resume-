<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Focused Template</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template skill-focused-template">
        <div class="header">
            <h1 class="name" id="previewName">Your Name</h1>
            <div class="contact-info">
                <span id="previewEmail"></span> • 
                <span id="previewPhone"></span> • 
                <span id="previewLocation"></span> • 
                <span id="previewLinkedIn"></span>
            </div>
        </div>
        
        <div class="section">
            <h2>Core Competencies</h2>
            <div id="previewSkills"></div>
        </div>
        
        <div class="section">
            <h2>Professional Summary</h2>
            <p id="previewSummary"></p>
        </div>
        
        <div class="section">
            <h2>Key Achievements</h2>
            <ul class="achievements-list">
                <li>Achievement placeholder - quantified results and impact</li>
                <li>Achievement placeholder - leadership and innovation</li>
                <li>Achievement placeholder - process improvement</li>
            </ul>
        </div>
        
        <div class="section">
            <h2>Professional Experience</h2>
            <div id="previewExperience"></div>
        </div>
        
        <div class="section">
            <h2>Education</h2>
            <div id="previewEducation"></div>
        </div>
    </div>

    <style>
        .skill-focused-template { 
            font-family: 'Arial', sans-serif; 
            background: #ffffff; 
            color: #000000; 
            line-height: 1.5; 
            max-width: 8.5in; 
            margin: 0 auto; 
            padding: 0.75in;
        }
        .skill-focused-template .header { 
            text-align: center; 
            margin-bottom: 1.5rem; 
            padding-bottom: 1rem;
            border-bottom: 2px solid #000000;
        }
        .skill-focused-template .name { 
            font-size: 2.2rem; 
            margin: 0 0 0.5rem 0; 
            font-weight: bold; 
            color: #000000;
        }
        .skill-focused-template .contact-info { 
            font-size: 1rem; 
            color: #333333;
        }
        .skill-focused-template .section { 
            margin-bottom: 1.8rem; 
        }
        .skill-focused-template h2 { 
            color: #000000; 
            font-size: 1.2rem; 
            margin-bottom: 0.8rem; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .skill-focused-template .achievements-list { 
            margin: 0; 
            padding-left: 1.2rem; 
        }
        .skill-focused-template .achievements-list li { 
            margin-bottom: 0.5rem; 
            color: #333333;
        }
        .skill-focused-template .experience-entry, .skill-focused-template .education-entry { 
            margin-bottom: 1.2rem; 
        }
        .skill-focused-template .entry-title { 
            font-weight: bold; 
            font-size: 1rem; 
            color: #000000; 
            margin-bottom: 0.2rem;
        }
        .skill-focused-template .entry-company { 
            color: #333333; 
            font-weight: normal; 
            font-size: 0.95rem;
        }
        .skill-focused-template .entry-dates { 
            color: #666666; 
            font-size: 0.9rem; 
            margin-top: 0.2rem;
        }
        .skill-focused-template .skills-list { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 0.5rem; 
        }
        .skill-focused-template .skill-tag { 
            background: transparent; 
            color: #333333; 
            padding: 0.4rem 0.6rem; 
            font-size: 0.9rem; 
            border: 1px solid #cccccc;
            text-align: center;
        }
    </style>

    <script src="../script.js"></script>
</body>
</html>
