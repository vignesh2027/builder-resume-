<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soft Pink Creative Template</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template soft-pink-creative-template">
        <div class="header-section">
            <h1 class="name" id="previewName">Your Name</h1>
            <div class="contact-info">
                <span id="previewEmail"></span> • <span id="previewPhone"></span> • <span id="previewLocation"></span> • <span id="previewLinkedIn"></span>
            </div>
        </div>
        
        <div class="content-wrapper">
            <div class="left-column">
                <div class="section">
                    <h3>Professional Summary</h3>
                    <p id="previewSummary"></p>
                </div>
                
                <div class="section">
                    <h3>Skills</h3>
                    <div id="previewSkills" class="skills-list"></div>
                </div>
                
                <div class="section">
                    <h3>Languages</h3>
                    <div id="previewLanguages" class="skills-list"></div>
                </div>
            </div>
            
            <div class="right-column">
                <div class="section">
                    <h3>Professional Experience</h3>
                    <div id="previewExperience"></div>
                </div>
                
                <div class="section">
                    <h3>Education</h3>
                    <div id="previewEducation"></div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .soft-pink-creative-template { 
            font-family: 'Georgia', serif; 
            background: #fdf2f8; 
            color: #374151; 
            line-height: 1.6; 
            max-width: 8.5in; 
            margin: 0 auto; 
            padding: 1in;
        }
        .soft-pink-creative-template .header-section { 
            text-align: center; 
            margin-bottom: 2rem; 
            padding: 1.5rem;
            background: #fce7f3;
            border-radius: 15px;
        }
        .soft-pink-creative-template .name { 
            font-size: 2.5rem; 
            margin: 0 0 0.5rem 0; 
            font-weight: normal; 
            color: #be185d;
        }
        .soft-pink-creative-template .contact-info { 
            font-size: 1rem; 
            color: #9f1239; 
        }
        .soft-pink-creative-template .content-wrapper { 
            display: flex; 
            gap: 2rem;
        }
        .soft-pink-creative-template .left-column, .soft-pink-creative-template .right-column { 
            flex: 1; 
        }
        .soft-pink-creative-template .section { 
            margin-bottom: 2rem; 
            background: #ffffff;
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: 0 2px 4px rgba(190, 24, 93, 0.1);
        }
        .soft-pink-creative-template h3 { 
            color: #be185d; 
            font-size: 1.3rem; 
            margin-bottom: 1rem; 
            font-weight: bold; 
        }
        .soft-pink-creative-template .experience-entry, .soft-pink-creative-template .education-entry { 
            margin-bottom: 1.5rem; 
        }
        .soft-pink-creative-template .entry-title { 
            font-weight: bold; 
            font-size: 1.1rem; 
            color: #be185d; 
            margin-bottom: 0.3rem;
        }
        .soft-pink-creative-template .entry-company { 
            color: #9f1239; 
            font-weight: normal; 
            font-size: 1rem;
        }
        .soft-pink-creative-template .entry-dates { 
            color: #6b7280; 
            font-size: 0.9rem; 
            margin-top: 0.3rem;
        }
        .soft-pink-creative-template .skills-list { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 0.5rem;
        }
        .soft-pink-creative-template .skill-tag { 
            display: inline-block; 
            background: #fce7f3; 
            color: #be185d; 
            padding: 0.4rem 0.8rem; 
            border-radius: 20px; 
            font-size: 0.9rem; 
            font-weight: 500; 
        }
    </style>

    <script src="../script.js"></script>
</body>
</html>
