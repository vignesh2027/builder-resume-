<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern ATS Template</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template modern-ats-template">
        <div class="header">
            <h1 class="name" id="previewName">Your Name</h1>
            <div class="contact-info">
                <div id="previewEmail"></div>
                <div id="previewPhone"></div>
                <div id="previewLocation"></div>
                <div id="previewLinkedIn"></div>
            </div>
        </div>
        
        <div class="content-wrapper">
            <div class="left-column">
                <div class="section">
                    <h2>PROFESSIONAL SUMMARY</h2>
                    <p id="previewSummary"></p>
                </div>
                
                <div class="section">
                    <h2>PROFESSIONAL EXPERIENCE</h2>
                    <div id="previewExperience"></div>
                </div>
            </div>
            
            <div class="right-column">
                <div class="section">
                    <h2>SKILLS</h2>
                    <div id="previewSkills"></div>
                </div>
                
                <div class="section">
                    <h2>EDUCATION</h2>
                    <div id="previewEducation"></div>
                </div>
                
                <div class="section">
                    <h2>LANGUAGES</h2>
                    <div id="previewLanguages"></div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .modern-ats-template { 
            font-family: 'Arial', sans-serif; 
            background: #ffffff; 
            color: #000000; 
            line-height: 1.4; 
            max-width: 8.5in; 
            margin: 0 auto; 
            padding: 0.75in;
        }
        .modern-ats-template .header { 
            text-align: center; 
            margin-bottom: 1.5rem; 
            padding-bottom: 1rem;
            border-bottom: 1px solid #000000;
        }
        .modern-ats-template .name { 
            font-size: 2rem; 
            margin: 0 0 0.5rem 0; 
            font-weight: bold; 
            color: #000000;
        }
        .modern-ats-template .contact-info { 
            font-size: 0.9rem; 
            color: #333333;
        }
        .modern-ats-template .contact-info div { 
            display: inline-block; 
            margin: 0 1rem; 
        }
        .modern-ats-template .content-wrapper { 
            display: flex; 
            gap: 2rem; 
        }
        .modern-ats-template .left-column { 
            flex: 2; 
        }
        .modern-ats-template .right-column { 
            flex: 1; 
        }
        .modern-ats-template .section { 
            margin-bottom: 1.5rem; 
        }
        .modern-ats-template h2 { 
            color: #000000; 
            font-size: 1.1rem; 
            margin-bottom: 0.8rem; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .modern-ats-template .experience-entry, .modern-ats-template .education-entry { 
            margin-bottom: 1.2rem; 
        }
        .modern-ats-template .entry-title { 
            font-weight: bold; 
            font-size: 1rem; 
            color: #000000; 
            margin-bottom: 0.2rem;
        }
        .modern-ats-template .entry-company { 
            color: #333333; 
            font-weight: normal; 
            font-size: 0.9rem;
        }
        .modern-ats-template .entry-dates { 
            color: #666666; 
            font-size: 0.85rem; 
            margin-top: 0.2rem;
        }
        .modern-ats-template .skills-list { 
            display: block; 
        }
        .modern-ats-template .skill-tag { 
            display: block; 
            background: transparent; 
            color: #333333; 
            padding: 0.2rem 0; 
            margin: 0; 
            font-size: 0.9rem; 
            border-bottom: 1px solid #eeeeee;
        }
    </style>

    <script src="../script.js"></script>
</body>
</html>
