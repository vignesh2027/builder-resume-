<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative 10 Resume Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="resume-template creative10-template">
    <div class="triangle-header">
        <div class="triangle-bg"></div>
        <div class="header-info">
            <h1 class="name" id="previewName">Your Name</h1>
            <h2 class="title" id="previewJobTitle">Professional Title</h2>
            <div class="contact-triangle">
                <span id="previewEmail">email@example.com</span>
                <span id="previewPhone">+1 (555) 123-4567</span>
                <span id="previewLocation">Location</span>
                <div id="previewLinkedIn"></div>
            </div>
        </div>
    </div>
    <div class="main-content">
        <div class="summary-triangle">
            <h3>Creative Summary</h3>
            <p id="previewSummary"></p>
        </div>
        <div class="content-grid">
            <div class="left-content">
                <div class="section">
                    <h3>Experience</h3>
                    <div id="previewExperience"></div>
                </div>
                <div class="section">
                    <h3>Education</h3>
                    <div id="previewEducation"></div>
                </div>
            </div>
            <div class="right-content">
                <div class="section">
                    <h3>Skills</h3>
                    <div id="previewSkills" class="skills-list"></div>
                </div>
                <div class="section">
                    <h3>Projects</h3>
                    <ul id="previewProjects"></ul>
                </div>
                <div class="section">
                    <h3>Languages</h3>
                    <div id="previewLanguages" class="skills-list"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<style>
.creative10-template { font-family: 'Montserrat', sans-serif; background: #fff; color: #333; }
.creative10-template .triangle-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 2rem; text-align: center; position: relative; overflow: hidden; }
.creative10-template .triangle-bg { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 100px solid transparent; border-right: 100px solid transparent; border-top: 60px solid rgba(255,255,255,0.1); }
.creative10-template .header-info { position: relative; z-index: 2; }
.creative10-template .name { font-size: 2.5rem; margin: 0; font-weight: 700; }
.creative10-template .title { font-size: 1.2rem; margin: 0.5rem 0 1rem 0; opacity: 0.9; font-weight: 300; }
.creative10-template .contact-triangle { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; font-size: 0.9rem; }
.creative10-template .main-content { padding: 2rem; }
.creative10-template .summary-triangle { background: #f8f9fa; padding: 1.5rem; border-radius: 15px; margin-bottom: 2rem; border: 2px solid #667eea; }
.creative10-template .summary-triangle h3 { margin: 0 0 1rem 0; color: #667eea; font-size: 1.2rem; }
.creative10-template .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
.creative10-template .section { margin-bottom: 2rem; }
.creative10-template h3 { color: #667eea; font-size: 1.2rem; margin-bottom: 1rem; font-weight: 600; }
.creative10-template .experience-entry, .creative10-template .education-entry { margin-bottom: 1.5rem; padding: 1rem; background: white; border-radius: 10px; box-shadow: 0 2px 10px rgba(102,126,234,0.1); }
.creative10-template .entry-title { font-weight: bold; font-size: 1.1rem; color: #333; }
.creative10-template .entry-company { color: #667eea; font-weight: 500; }
.creative10-template .entry-dates { color: #666; font-size: 0.9rem; }
.creative10-template .skills-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.creative10-template .skill-tag { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 0.4rem 1rem; border-radius: 25px; font-size: 0.85rem; }
</style>
</body>
</html>
