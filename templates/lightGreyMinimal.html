<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Grey Minimal Template</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template light-grey-minimal-template">
        <div class="header-section">
            <h1 class="name" id="previewName">Your Name</h1>
            <div class="contact-info">
                <span id="previewEmail"></span> • <span id="previewPhone"></span> • <span id="previewLocation"></span> • <span id="previewLinkedIn"></span>
            </div>
        </div>
        
        <div class="content-wrapper">
            <div class="section">
                <h3>Professional Summary</h3>
                <p id="previewSummary"></p>
            </div>
            
            <div class="section">
                <h3>Professional Experience</h3>
                <div id="previewExperience"></div>
            </div>
            
            <div class="section">
                <h3>Education</h3>
                <div id="previewEducation"></div>
            </div>
            
            <div class="section">
                <h3>Skills</h3>
                <div id="previewSkills" class="skills-list"></div>
            </div>
            
            <div class="section">
                <h3>Languages</h3>
                <div id="previewLanguages" class="skills-list"></div>
            </div>
        </div>
    </div>

    <style>
        .light-grey-minimal-template { 
            font-family: 'Arial', sans-serif; 
            background: #ffffff; 
            color: #374151; 
            line-height: 1.6; 
            max-width: 8.5in; 
            margin: 0 auto; 
            padding: 1in;
        }
        .light-grey-minimal-template .header-section { 
            margin-bottom: 2rem; 
            padding-bottom: 1rem;
        }
        .light-grey-minimal-template .name { 
            font-size: 2.2rem; 
            margin: 0 0 0.5rem 0; 
            font-weight: 600; 
            color: #1f2937;
        }
        .light-grey-minimal-template .contact-info { 
            font-size: 1rem; 
            color: #6b7280; 
        }
        .light-grey-minimal-template .content-wrapper { 
            max-width: 100%; 
        }
        .light-grey-minimal-template .section { 
            margin-bottom: 2rem; 
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 1.5rem;
        }
        .light-grey-minimal-template .section:last-child {
            border-bottom: none;
        }
        .light-grey-minimal-template h3 { 
            color: #1f2937; 
            font-size: 1.2rem; 
            margin-bottom: 1rem; 
            font-weight: 600; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .light-grey-minimal-template .experience-entry, .light-grey-minimal-template .education-entry { 
            margin-bottom: 1.5rem; 
        }
        .light-grey-minimal-template .entry-title { 
            font-weight: 600; 
            font-size: 1.1rem; 
            color: #1f2937; 
            margin-bottom: 0.3rem;
        }
        .light-grey-minimal-template .entry-company { 
            color: #6b7280; 
            font-weight: normal; 
            font-size: 1rem;
        }
        .light-grey-minimal-template .entry-dates { 
            color: #9ca3af; 
            font-size: 0.9rem; 
            margin-top: 0.3rem;
        }
        .light-grey-minimal-template .skills-list { 
            display: block; 
        }
        .light-grey-minimal-template .skill-tag { 
            display: inline; 
            background: transparent; 
            color: #374151; 
            padding: 0; 
            margin: 0; 
            font-size: 1rem; 
            font-weight: normal; 
        }
        .light-grey-minimal-template .skill-tag:not(:last-child):after {
            content: " • ";
            color: #d1d5db;
        }
    </style>

    <script src="../script.js"></script>
</body>
</html>
