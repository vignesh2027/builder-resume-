<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Accent Professional Template</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template green-accent-professional-template">
        <div class="header-section">
            <h1 class="name" id="previewName">Your Name</h1>
            <div class="contact-info">
                <span id="previewEmail"></span> • <span id="previewPhone"></span> • <span id="previewLocation"></span> • <span id="previewLinkedIn"></span>
            </div>
        </div>
        
        <div class="content-wrapper">
            <div class="section">
                <h3>Professional Summary</h3>
                <p id="previewSummary"></p>
            </div>
            
            <div class="section">
                <h3>Professional Experience</h3>
                <div id="previewExperience"></div>
            </div>
            
            <div class="section">
                <h3>Education</h3>
                <div id="previewEducation"></div>
            </div>
            
            <div class="section">
                <h3>Skills</h3>
                <div id="previewSkills" class="skills-list"></div>
            </div>
            
            <div class="section">
                <h3>Languages</h3>
                <div id="previewLanguages" class="skills-list"></div>
            </div>
        </div>
    </div>

    <style>
        .green-accent-professional-template { 
            font-family: 'Arial', sans-serif; 
            background: #ffffff; 
            color: #333333; 
            line-height: 1.6; 
            max-width: 8.5in; 
            margin: 0 auto; 
            padding: 1in;
            border-left: 8px solid #16a34a;
        }
        .green-accent-professional-template .header-section { 
            margin-bottom: 2rem; 
            padding-bottom: 1rem;
            border-bottom: 2px solid #16a34a;
        }
        .green-accent-professional-template .name { 
            font-size: 2.5rem; 
            margin: 0 0 0.5rem 0; 
            font-weight: bold; 
            color: #16a34a;
        }
        .green-accent-professional-template .contact-info { 
            font-size: 1rem; 
            color: #6b7280; 
        }
        .green-accent-professional-template .content-wrapper { 
            max-width: 100%; 
        }
        .green-accent-professional-template .section { 
            margin-bottom: 2rem; 
            border-left: 4px solid #16a34a;
            padding-left: 1rem;
        }
        .green-accent-professional-template h3 { 
            color: #16a34a; 
            font-size: 1.4rem; 
            margin-bottom: 1rem; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        .green-accent-professional-template .experience-entry, .green-accent-professional-template .education-entry { 
            margin-bottom: 1.5rem; 
        }
        .green-accent-professional-template .entry-title { 
            font-weight: bold; 
            font-size: 1.1rem; 
            color: #1f2937; 
            margin-bottom: 0.3rem;
        }
        .green-accent-professional-template .entry-company { 
            color: #16a34a; 
            font-weight: normal; 
            font-size: 1rem;
        }
        .green-accent-professional-template .entry-dates { 
            color: #6b7280; 
            font-size: 0.9rem; 
            margin-top: 0.3rem;
        }
        .green-accent-professional-template .skills-list { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 0.5rem;
        }
        .green-accent-professional-template .skill-tag { 
            display: inline-block; 
            background: #dcfce7; 
            color: #16a34a; 
            padding: 0.3rem 0.8rem; 
            border-radius: 20px; 
            font-size: 0.9rem; 
            font-weight: 500; 
            border: 1px solid #16a34a;
        }
    </style>

    <script src="../script.js"></script>
</body>
</html>
