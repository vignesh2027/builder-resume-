<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technology Template</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template technology-template">
        <div class="header-section">
            <h1 class="name" id="previewName">Your Name</h1>
            <h2 class="title" id="previewJobTitle">Software Developer</h2>
            <div class="contact-info">
                <span id="previewEmail"></span> • <span id="previewPhone"></span> • <span id="previewLocation"></span> • <span id="previewLinkedIn"></span>
            </div>
        </div>
        
        <div class="content-wrapper">
            <div class="section">
                <h3>Technical Summary</h3>
                <p id="previewSummary"></p>
            </div>
            
            <div class="section">
                <h3>Professional Experience</h3>
                <div id="previewExperience"></div>
            </div>
            
            <div class="grid-section">
                <div class="education-grid">
                    <h3>Education</h3>
                    <div id="previewEducation"></div>
                </div>
                
                <div class="skills-grid">
                    <h3>Technical Skills</h3>
                    <div id="previewSkills" class="skills-grid-list"></div>
                </div>
                
                <div class="languages-grid">
                    <h3>Languages</h3>
                    <div id="previewLanguages" class="skills-grid-list"></div>
                </div>
                
                <div class="certifications-grid">
                    <h3>Certifications</h3>
                    <div class="cert-placeholder">AWS Certified Developer<br>Google Cloud Professional<br>Microsoft Azure Fundamentals</div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .technology-template { 
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace; 
            background: #1a1a1a; 
            color: #e0e0e0; 
            line-height: 1.6; 
            max-width: 8.5in; 
            margin: 0 auto; 
        }
        .technology-template .header-section { 
            text-align: center; 
            padding: 2.5rem 2rem 2rem; 
            background: linear-gradient(135deg, #00d4aa 0%, #00a8cc 100%);
            color: #1a1a1a;
        }
        .technology-template .name { 
            font-size: 2.5rem; 
            margin: 0; 
            font-weight: 700; 
            font-family: 'Arial', sans-serif;
        }
        .technology-template .title { 
            font-size: 1.3rem; 
            margin: 1rem 0 1.5rem 0; 
            font-weight: 400; 
            font-family: 'Arial', sans-serif;
        }
        .technology-template .contact-info { 
            font-size: 1rem; 
            font-family: 'Arial', sans-serif;
        }
        .technology-template .content-wrapper { 
            padding: 2rem 3rem; 
        }
        .technology-template .section { 
            margin-bottom: 2.5rem; 
        }
        .technology-template h3 { 
            color: #00d4aa; 
            font-size: 1.2rem; 
            margin-bottom: 1.5rem; 
            font-weight: 600; 
            font-family: 'Arial', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #00d4aa;
            padding-bottom: 0.5rem;
        }
        .technology-template .grid-section { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 2rem; 
        }
        .technology-template .experience-entry, .technology-template .education-entry { 
            margin-bottom: 2rem; 
            padding: 1.5rem;
            background: #2a2a2a;
            border-radius: 8px;
            border: 1px solid #404040;
        }
        .technology-template .entry-title { 
            font-weight: 600; 
            font-size: 1.1rem; 
            color: #00d4aa; 
            margin-bottom: 0.5rem;
            font-family: 'Arial', sans-serif;
        }
        .technology-template .entry-company { 
            color: #00a8cc; 
            font-weight: 500; 
            font-size: 1rem;
            font-family: 'Arial', sans-serif;
        }
        .technology-template .entry-dates { 
            color: #888; 
            font-size: 0.95rem; 
            margin-top: 0.5rem;
            font-family: 'Arial', sans-serif;
        }
        .technology-template .skills-grid-list { 
            display: grid; 
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }
        .technology-template .skill-tag { 
            background: #2a2a2a; 
            color: #00d4aa; 
            padding: 0.5rem 0.8rem; 
            font-size: 0.9rem; 
            border-radius: 4px;
            border: 1px solid #404040;
            text-align: center;
            font-family: 'Consolas', monospace;
        }
        .technology-template .cert-placeholder {
            background: #2a2a2a;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #404040;
            font-size: 0.9rem;
            color: #e0e0e0;
            font-family: 'Arial', sans-serif;
        }
    </style>

    <script src="../script.js"></script>
</body>
</html>
