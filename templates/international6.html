<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>International Resume Template 6</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template international6-template">
        <div class="left-panel">
            <div class="profile-section">
                <div class="profile-photo-placeholder"></div>
                <h1 class="name" id="previewName">Your Name</h1>
                <h2 class="title" id="previewJobTitle">Professional Title</h2>
            </div>
            <div class="contact-section">
                <h3>Contact Information</h3>
                <div class="contact-item" id="previewEmail"></div>
                <div class="contact-item" id="previewPhone"></div>
                <div class="contact-item" id="previewLocation"></div>
                <div class="contact-item" id="previewLinkedIn"></div>
            </div>
            <div class="section">
                <h3>Skills & Expertise</h3>
                <div id="previewSkills" class="skills-list"></div>
            </div>
            <div class="section">
                <h3>Languages</h3>
                <div id="previewLanguages" class="skills-list"></div>
            </div>
        </div>
        <div class="right-panel">
            <div class="section">
                <h3>Professional Summary</h3>
                <p id="previewSummary"></p>
            </div>
            <div class="section">
                <h3>Professional Experience</h3>
                <div id="previewExperience"></div>
            </div>
            <div class="section">
                <h3>Education & Qualifications</h3>
                <div id="previewEducation"></div>
            </div>
            <div class="section">
                <h3>Notable Projects</h3>
                <ul id="previewProjects"></ul>
            </div>
        </div>
    </div>
    <style>
        .international6-template { font-family: 'Segoe UI', sans-serif; background: #fff; color: #2c3e50; display: flex; }
        .international6-template .left-panel { width: 320px; background: #34495e; color: white; padding: 2rem 1.5rem; }
        .international6-template .profile-photo-placeholder { width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.2); margin: 0 auto 1.5rem; border: 4px solid white; }
        .international6-template .name { font-size: 1.8rem; margin: 0 0 0.5rem 0; font-weight: 600; text-align: center; }
        .international6-template .title { font-size: 1rem; margin: 0 0 2rem 0; text-align: center; opacity: 0.9; font-weight: 300; }
        .international6-template .left-panel h3 { color: #ecf0f1; font-size: 1.1rem; margin: 2rem 0 1rem 0; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; border-bottom: 2px solid #3498db; padding-bottom: 0.5rem; }
        .international6-template .contact-item { margin-bottom: 0.8rem; font-size: 0.9rem; opacity: 0.9; }
        .international6-template .right-panel { flex: 1; padding: 2rem; }
        .international6-template .right-panel .section { margin-bottom: 2.5rem; }
        .international6-template .right-panel h3 { color: #34495e; font-size: 1.4rem; margin-bottom: 1rem; font-weight: 600; border-bottom: 3px solid #3498db; padding-bottom: 0.5rem; }
        .international6-template .experience-entry, .international6-template .education-entry { margin-bottom: 2rem; }
        .international6-template .entry-title { font-weight: bold; font-size: 1.2rem; color: #2c3e50; }
        .international6-template .entry-company { color: #3498db; font-weight: 600; margin: 0.3rem 0; }
        .international6-template .entry-dates { color: #7f8c8d; font-size: 0.9rem; }
        .international6-template .skills-list { display: block; }
        .international6-template .skill-tag { display: block; background: rgba(52, 152, 219, 0.2); color: #ecf0f1; padding: 0.4rem 0.8rem; margin: 0.3rem 0; border-radius: 4px; font-size: 0.9rem; border-left: 3px solid #3498db; }
    </style>
    <script src="../script.js"></script>
</body>
</html>
