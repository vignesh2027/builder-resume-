<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yellow Icon Highlights Template</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template yellow-icon-highlights-template">
        <div class="header-section">
            <h1 class="name" id="previewName">Your Name</h1>
            <div class="contact-info">
                <span id="previewEmail"></span> • <span id="previewPhone"></span> • <span id="previewLocation"></span> • <span id="previewLinkedIn"></span>
            </div>
        </div>
        
        <div class="content-wrapper">
            <div class="section">
                <div class="section-header">
                    <div class="section-icon">📝</div>
                    <h3>Professional Summary</h3>
                </div>
                <p id="previewSummary"></p>
            </div>
            
            <div class="section">
                <div class="section-header">
                    <div class="section-icon">💼</div>
                    <h3>Professional Experience</h3>
                </div>
                <div id="previewExperience"></div>
            </div>
            
            <div class="section">
                <div class="section-header">
                    <div class="section-icon">🎓</div>
                    <h3>Education</h3>
                </div>
                <div id="previewEducation"></div>
            </div>
            
            <div class="section">
                <div class="section-header">
                    <div class="section-icon">⚡</div>
                    <h3>Skills</h3>
                </div>
                <div id="previewSkills" class="skills-list"></div>
            </div>
            
            <div class="section">
                <div class="section-header">
                    <div class="section-icon">🌍</div>
                    <h3>Languages</h3>
                </div>
                <div id="previewLanguages" class="skills-list"></div>
            </div>
        </div>
    </div>

    <style>
        .yellow-icon-highlights-template { 
            font-family: 'Arial', sans-serif; 
            background: #ffffff; 
            color: #333333; 
            line-height: 1.6; 
            max-width: 8.5in; 
            margin: 0 auto; 
            padding: 1in;
        }
        .yellow-icon-highlights-template .header-section { 
            text-align: center; 
            margin-bottom: 2rem; 
            padding-bottom: 1rem;
            border-bottom: 3px solid #fbbf24;
        }
        .yellow-icon-highlights-template .name { 
            font-size: 2.5rem; 
            margin: 0 0 0.5rem 0; 
            font-weight: bold; 
            color: #1f2937;
        }
        .yellow-icon-highlights-template .contact-info { 
            font-size: 1rem; 
            color: #6b7280; 
        }
        .yellow-icon-highlights-template .content-wrapper { 
            max-width: 100%; 
        }
        .yellow-icon-highlights-template .section { 
            margin-bottom: 2rem; 
        }
        .yellow-icon-highlights-template .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }
        .yellow-icon-highlights-template .section-icon {
            width: 40px;
            height: 40px;
            background: #fbbf24;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 1rem;
            font-size: 1.2rem;
        }
        .yellow-icon-highlights-template h3 { 
            color: #1f2937; 
            font-size: 1.3rem; 
            margin: 0; 
            font-weight: bold; 
        }
        .yellow-icon-highlights-template .experience-entry, .yellow-icon-highlights-template .education-entry { 
            margin-bottom: 1.5rem; 
            padding-left: 3rem;
        }
        .yellow-icon-highlights-template .entry-title { 
            font-weight: bold; 
            font-size: 1.1rem; 
            color: #1f2937; 
            margin-bottom: 0.3rem;
        }
        .yellow-icon-highlights-template .entry-company { 
            color: #fbbf24; 
            font-weight: 600; 
            font-size: 1rem;
        }
        .yellow-icon-highlights-template .entry-dates { 
            color: #6b7280; 
            font-size: 0.9rem; 
            margin-top: 0.3rem;
        }
        .yellow-icon-highlights-template .skills-list { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 0.5rem;
            padding-left: 3rem;
        }
        .yellow-icon-highlights-template .skill-tag { 
            display: inline-block; 
            background: #fef3c7; 
            color: #92400e; 
            padding: 0.4rem 0.8rem; 
            border-radius: 6px; 
            font-size: 0.9rem; 
            font-weight: 500; 
            border: 1px solid #fbbf24;
        }
    </style>

    <script src="../script.js"></script>
</body>
</html>
