<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Column Professional Template</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template two-column-professional-template">
        <div class="header-section">
            <h1 class="name" id="previewName">Your Name</h1>
            <h2 class="title" id="previewJobTitle">Professional Title</h2>
            <div class="contact-info">
                <span id="previewEmail"></span> • <span id="previewPhone"></span> • <span id="previewLocation"></span> • <span id="previewLinkedIn"></span>
            </div>
        </div>
        
        <div class="summary-section">
            <h3>Professional Summary</h3>
            <p id="previewSummary"></p>
        </div>
        
        <div class="main-content">
            <div class="left-column">
                <div class="section">
                    <h3>Professional Experience</h3>
                    <div id="previewExperience"></div>
                </div>
            </div>
            
            <div class="right-column">
                <div class="section">
                    <h3>Education</h3>
                    <div id="previewEducation"></div>
                </div>
                
                <div class="section">
                    <h3>Skills</h3>
                    <div id="previewSkills" class="skills-list"></div>
                </div>
                
                <div class="section">
                    <h3>Languages</h3>
                    <div id="previewLanguages" class="skills-list"></div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .two-column-professional-template { 
            font-family: 'Arial', sans-serif; 
            background: #ffffff; 
            color: #333333; 
            line-height: 1.6; 
            max-width: 8.5in; 
            margin: 0 auto; 
            padding: 2rem;
        }
        .two-column-professional-template .header-section { 
            text-align: center; 
            margin-bottom: 2rem; 
            padding-bottom: 1.5rem;
            border-bottom: 2px solid #2c3e50;
        }
        .two-column-professional-template .name { 
            font-size: 2.5rem; 
            margin: 0 0 0.5rem 0; 
            font-weight: bold; 
            color: #2c3e50;
        }
        .two-column-professional-template .title { 
            font-size: 1.2rem; 
            margin: 0 0 1rem 0; 
            font-weight: normal; 
            color: #34495e; 
        }
        .two-column-professional-template .contact-info { 
            font-size: 1rem; 
            color: #555; 
        }
        .two-column-professional-template .summary-section { 
            margin-bottom: 2rem; 
            padding: 1.5rem; 
            background: #f8f9fa; 
            border-left: 4px solid #2c3e50;
        }
        .two-column-professional-template .summary-section h3 { 
            color: #2c3e50; 
            font-size: 1.2rem; 
            margin-bottom: 1rem; 
            font-weight: bold; 
        }
        .two-column-professional-template .main-content { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 2rem; 
        }
        .two-column-professional-template .section { 
            margin-bottom: 2rem; 
        }
        .two-column-professional-template h3 { 
            color: #2c3e50; 
            font-size: 1.2rem; 
            margin-bottom: 1.5rem; 
            font-weight: bold; 
            text-transform: uppercase;
            border-bottom: 1px solid #2c3e50;
            padding-bottom: 0.5rem;
        }
        .two-column-professional-template .experience-entry, .two-column-professional-template .education-entry { 
            margin-bottom: 1.5rem; 
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }
        .two-column-professional-template .entry-title { 
            font-weight: bold; 
            font-size: 1.1rem; 
            color: #2c3e50; 
            margin-bottom: 0.3rem;
        }
        .two-column-professional-template .entry-company { 
            color: #34495e; 
            font-weight: normal; 
            font-size: 1rem;
        }
        .two-column-professional-template .entry-dates { 
            color: #666; 
            font-size: 0.9rem; 
            margin-top: 0.3rem;
        }
        .two-column-professional-template .skills-list { 
            display: block; 
        }
        .two-column-professional-template .skill-tag { 
            display: inline-block; 
            background: #2c3e50; 
            color: #ffffff; 
            padding: 0.5rem 1rem; 
            margin: 0.3rem 0.5rem 0.3rem 0; 
            font-size: 0.9rem; 
            border-radius: 3px;
        }
    </style>

    <script src="../script.js"></script>
</body>
</html>
