<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Serif Template</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="resume-template classic-serif-template">
        <div class="header">
            <h1 class="name" id="previewName">Your Name</h1>
            <div class="contact-info">
                <span id="previewEmail"></span> | 
                <span id="previewPhone"></span> | 
                <span id="previewLocation"></span> | 
                <span id="previewLinkedIn"></span>
            </div>
        </div>
        
        <div class="section">
            <h2>Summary</h2>
            <p id="previewSummary"></p>
        </div>
        
        <div class="section">
            <h2>Experience</h2>
            <div id="previewExperience"></div>
        </div>
        
        <div class="section">
            <h2>Education</h2>
            <div id="previewEducation"></div>
        </div>
        
        <div class="section">
            <h2>Skills</h2>
            <div id="previewSkills"></div>
        </div>
    </div>

    <style>
        .classic-serif-template { 
            font-family: 'Times New Roman', serif; 
            background: #ffffff; 
            color: #000000; 
            line-height: 1.6; 
            max-width: 8.5in; 
            margin: 0 auto; 
            padding: 1in;
        }
        .classic-serif-template .header { 
            text-align: center; 
            margin-bottom: 2rem; 
            padding-bottom: 1rem;
        }
        .classic-serif-template .name { 
            font-size: 2.5rem; 
            margin: 0 0 0.5rem 0; 
            font-weight: bold; 
            color: #000000;
        }
        .classic-serif-template .contact-info { 
            font-size: 1rem; 
            color: #333333;
        }
        .classic-serif-template .section { 
            margin-bottom: 2.5rem; 
        }
        .classic-serif-template h2 { 
            color: #000000; 
            font-size: 1.3rem; 
            margin-bottom: 1rem; 
            font-weight: bold; 
            border-bottom: 1px solid #000000;
            padding-bottom: 0.3rem;
        }
        .classic-serif-template .experience-entry, .classic-serif-template .education-entry { 
            margin-bottom: 2rem; 
        }
        .classic-serif-template .entry-title { 
            font-weight: bold; 
            font-size: 1.1rem; 
            color: #000000; 
            margin-bottom: 0.3rem;
        }
        .classic-serif-template .entry-company { 
            color: #333333; 
            font-weight: normal; 
            font-size: 1rem;
            font-style: italic;
        }
        .classic-serif-template .entry-dates { 
            color: #666666; 
            font-size: 0.9rem; 
            margin-top: 0.3rem;
        }
        .classic-serif-template .skills-list { 
            display: block; 
        }
        .classic-serif-template .skill-tag { 
            display: inline; 
            background: transparent; 
            color: #333333; 
            padding: 0; 
            margin: 0; 
            font-size: 1rem; 
        }
        .classic-serif-template .skill-tag:after { 
            content: ", "; 
        }
        .classic-serif-template .skill-tag:last-child:after { 
            content: ""; 
        }
    </style>

    <script src="../script.js"></script>
</body>
</html>
